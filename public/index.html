<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mëso Shqip AI - Pro Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; touch-action: manipulation; }
        .premium-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .level-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .level-card:hover:not(.locked) { transform: translateY(-8px) scale(1.02); border-color: #6366f1; box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.3); }
        .locked { opacity: 0.3; grayscale: 1; cursor: not-allowed; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const WORD_DATA = [
            "Përshëndetje", "Mirëdita", "Mirëmëngjesi", "Mirëmbrëma", "Faleminderit", "Ju lutem", "Si jeni?", "Mirë", "Keq", "Po", "Jo",
            "Bukë", "Ujë", "Shtëpi", "Shkollë", "Punë", "Libër", "Makinë", "Rrugë", "Qytet", "Fshat", "Deti", "Mali", "Dielli", "Hëna",
            "Gjuha shqipe", "Kosovë", "Shqipëri", "Tiranë", "Prishtinë", "Vlorë", "Pejë", "Durrës", "Prizren", "Gjakovë", "Shkodër",
            "Mëngjesi", "Dreka", "Darka", "Mollë", "Dardhë", "Portokall", "Bukë", "Kripë", "Zemër", "Shpirt", "Lule", "Pemë",
            "Një", "Dy", "Tre", "Katër", "Pesë", "Gjashtë", "Shtatë", "Tetë", "Nëntë", "Dhjetë", "Njëqind", "Mijë",
            "E hënë", "E martë", "E mërkurë", "E enjte", "E premte", "E shtunë", "E diel", "Sot", "Nesër", "Dje", "Tani",
            "Unë flas shqip", "Ti je i mirë", "Ne jemi shokë", "Ata vijnë nesër", "Më ndihmo pak", "Ku ndodhesh?", "Sa kushton?",
            "Ku është shkolla?", "Më jep pak ujë", "Kam nevojë për ndihmë", "Gëzuar festën", "Paç fat", "Natën e mirë"
        ];

        const LEVELS = Array.from({ length: 100 }, (_, i) => ({
            id: i + 1,
            words: WORD_DATA.slice((i * 3) % WORD_DATA.length, ((i * 3) + 3) % WORD_DATA.length || WORD_DATA.length)
        }));

        function App() {
            const [state, setState] = useState({ view: 'loading', user: null, tab: 'levels' });
            const [game, setGame] = useState({ level: null, wordIdx: 0, feedback: null, recording: false });
            const [premium, setPremium] = useState({ open: false, step: 'email', email: '', code: '', loading: false });
            const [customText, setCustomText] = useState('');
            const [admin, setAdmin] = useState({ token: null, users: [], email: '', pass: '' });

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('mesoshqip_user');
                    if (saved) setState(s => ({ ...s, user: JSON.parse(saved), view: 'main' }));
                    else setState(s => ({ ...s, view: 'register' }));
                } catch (e) {
                    localStorage.removeItem('mesoshqip_user');
                    setState(s => ({ ...s, view: 'register' }));
                }
            }, []);

            const syncProgress = async (u) => {
                try {
                    await fetch('/api/user/progress', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: u.id, level: u.level, xp: u.xp })
                    });
                } catch (e) {}
            };

            const speak = (text) => {
                if (!text) return;
                if (!state.user?.isPremium && state.tab === 'custom') { setPremium(p => ({ ...p, open: true })); return; }
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'sq-AL';
                u.rate = 0.85;
                window.speechSynthesis.speak(u);
            };

            const listen = (target) => {
                const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Rec) return alert("Browser mismatch");
                const rec = new Rec();
                rec.lang = 'sq-AL';
                rec.onstart = () => setGame(g => ({ ...g, recording: true }));
                rec.onresult = (e) => {
                    const res = e.results[0][0].transcript.toLowerCase().trim();
                    const tar = target.toLowerCase().replace(/[.,!?]/g, '').trim();
                    if (res === tar || tar.includes(res)) {
                        setGame(g => ({ ...g, feedback: { status: 'ok', msg: 'Saktë! 🌟' } }));
                        if (game.level) {
                            if (game.wordIdx < game.level.words.length - 1) {
                                setTimeout(() => setGame(g => ({ ...g, wordIdx: g.wordIdx + 1, feedback: null })), 1000);
                            } else {
                                setGame(g => ({ ...g, feedback: { status: 'win', msg: 'Niveli u krye! +50 XP 🏆' } }));
                                const upd = { ...state.user, level: Math.max(state.user.level, game.level.id + 1), xp: state.user.xp + 50 };
                                setState(s => ({ ...s, user: upd }));
                                localStorage.setItem('mesoshqip_user', JSON.stringify(upd));
                                syncProgress(upd);
                            }
                        }
                    } else {
                        setGame(g => ({ ...g, feedback: { status: 'err', msg: `Provo përsëri! Dëgjuam: "${res}"` } }));
                    }
                };
                rec.onend = () => setGame(g => ({ ...g, recording: false }));
                rec.start();
            };

            if (state.view === 'loading') return <div className="h-screen flex items-center justify-center"><div className="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></div>;

            if (state.view === 'register') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass p-12 rounded-[40px] w-full max-w-md text-center">
                        <div className="w-20 h-20 premium-gradient rounded-3xl flex items-center justify-center mx-auto mb-8 text-white text-3xl font-black shadow-xl">SH</div>
                        <h1 className="text-4xl font-black mb-10">Mëso Shqip AI</h1>
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: e.target.name.value }) });
                            const data = await res.json();
                            setState({ ...state, user: data.user, view: 'main' });
                            localStorage.setItem('mesoshqip_user', JSON.stringify(data.user));
                        }} className="space-y-4">
                            <input name="name" className="w-full p-5 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-indigo-500 text-white font-bold" placeholder="Emri juaj" required />
                            <button className="w-full premium-gradient text-white p-5 rounded-2xl font-black text-xl active:scale-95 transition-all">Fillo</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 p-4 md:px-10 flex justify-between items-center">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => {setGame({ ...game, level: null }); setState({ ...state, tab: 'levels' });}}>
                            <div className="w-10 h-10 premium-gradient rounded-xl flex items-center justify-center text-white font-black">SH</div>
                            <div className="hidden sm:block">
                                <h1 className="text-sm font-black">Mëso Shqip</h1>
                                <p className="text-[10px] text-indigo-400 font-bold">LVL {state.user?.level} • {state.user?.xp} XP</p>
                            </div>
                        </div>
                        <div className="flex bg-white/5 p-1 rounded-xl">
                            {['levels', 'custom'].map(t => (
                                <button key={t} onClick={() => {setGame({ ...game, level: null }); setState({ ...state, tab: t });}} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${state.tab === t ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>{t === 'levels' ? 'Nivelet' : 'Lirë'}</button>
                            ))}
                        </div>
                        <button onClick={() => setPremium({ ...premium, open: true })} className={`px-4 py-2 rounded-full text-[10px] font-black uppercase ${state.user?.isPremium ? 'text-emerald-400' : 'premium-gradient text-white'}`}>{state.user?.isPremium ? 'PRO' : 'MERR PRO'}</button>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 mt-6">
                        {state.tab === 'levels' && !game.level && (
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4">
                                {LEVELS.map(l => {
                                    const isLocked = l.id > state.user?.level;
                                    return (
                                        <button key={l.id} onClick={() => !isLocked && setGame({ ...game, level: l, wordIdx: 0, feedback: null })} className={`aspect-square rounded-3xl glass flex items-center justify-center text-2xl font-black ${isLocked ? 'locked' : 'level-card text-indigo-400'}`}>{l.id}</button>
                                    );
                                })}
                            </div>
                        )}

                        {game.level && (
                            <div className="max-w-xl mx-auto glass p-10 md:p-16 rounded-[60px] text-center relative animate-pop">
                                <button onClick={() => setGame({ ...game, level: null })} className="absolute top-8 left-8 text-slate-500"><XIcon size={20}/></button>
                                <div className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6">Niveli {game.level.id} • {game.wordIdx + 1}/{game.level.words.length}</div>
                                <div className="text-4xl md:text-6xl font-black mb-12">{game.level.words[game.wordIdx]}</div>
                                <div className="flex justify-center gap-6">
                                    <button onClick={() => speak(game.level.words[game.wordIdx])} className="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center text-indigo-400 hover:bg-white/10"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>
                                    <button onClick={() => listen(game.level.words[game.wordIdx])} disabled={game.recording} className={`w-20 h-20 rounded-3xl flex items-center justify-center ${game.recording ? 'bg-red-500 animate-pulse' : 'bg-indigo-600 hover:bg-indigo-500'}`}><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg></button>
                                </div>
                                {game.feedback && <div className={`mt-10 font-black ${game.feedback.status === 'err' ? 'text-rose-400' : 'text-emerald-400'}`}>{game.feedback.msg} {game.feedback.status === 'win' && <button onClick={() => setGame({ ...game, level: null })} className="block mx-auto mt-4 bg-emerald-500 text-white px-6 py-2 rounded-xl text-xs">Vazhdo</button>}</div>}
                            </div>
                        )}

                        {state.tab === 'custom' && (
                            <div className="max-w-2xl mx-auto space-y-6">
                                <textarea className="w-full p-8 bg-white/5 border border-white/10 rounded-[40px] outline-none focus:border-indigo-500 text-2xl font-black text-white min-h-[200px]" placeholder="Shkruaj fjalinë tënde..." value={customText} onChange={e => setCustomText(e.target.value)} />
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => speak(customText)} className="p-6 bg-white/5 rounded-3xl font-black hover:bg-white/10">Dëgjo AI</button>
                                    <button onClick={() => listen(customText)} className="p-6 bg-indigo-600 rounded-3xl font-black hover:bg-indigo-500">Praktiko</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {premium.open && (
                        <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl flex items-center justify-center p-6 z-[100]">
                            <div className="glass p-12 rounded-[50px] w-full max-w-lg text-center relative animate-pop">
                                <button onClick={() => setPremium({ ...premium, open: false, step: 'email' })} className="absolute top-8 right-8 text-slate-500"><XIcon size={24}/></button>
                                <div className="w-20 h-20 premium-gradient rounded-3xl flex items-center justify-center mx-auto mb-8 text-white shadow-xl"><MailIcon size={32}/></div>
                                <h2 className="text-3xl font-black mb-4">Aktivizo PRO</h2>
                                <p className="text-slate-400 text-sm mb-10">Për praktikë të pakufizuar dhe zëra HD, verifiko email-in tënd.</p>
                                {premium.step === 'email' ? (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault(); setPremium({ ...premium, loading: true });
                                        const res = await fetch('/api/premium/request', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: state.user.id, email: premium.email }) });
                                        const data = await res.json();
                                        if (res.ok) { if(data.isSimulation) alert("CODE: " + data.code); setPremium({ ...premium, step: 'verify', loading: false }); }
                                        else { alert(data.error); setPremium({ ...premium, loading: false }); }
                                    }} className="space-y-4">
                                        <input type="email" className="w-full p-5 bg-white/5 border border-white/10 rounded-2xl outline-none text-white text-center font-bold" placeholder="Email adresa" value={premium.email} onChange={e=>setPremium({...premium, email:e.target.value})} required />
                                        <button disabled={premium.loading} className="w-full premium-gradient text-white p-5 rounded-2xl font-black">DËRGO KODIN</button>
                                    </form>
                                ) : (
                                    <form onSubmit={async (e) => {
                                        e.preventDefault(); setPremium({ ...premium, loading: true });
                                        const res = await fetch('/api/premium/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: state.user.id, code: premium.code }) });
                                        const data = await res.json();
                                        if (res.ok) { setState({ ...state, user: data.user }); localStorage.setItem('mesoshqip_user', JSON.stringify(data.user)); setPremium({ ...premium, open: false, loading: false }); alert("Urime! Jeni PRO."); }
                                        else { alert(data.error); setPremium({ ...premium, loading: false }); }
                                    }} className="space-y-4">
                                        <input type="text" className="w-full p-5 bg-white/5 border border-white/10 rounded-2xl outline-none text-white text-center font-black tracking-widest text-2xl" placeholder="000000" maxLength="6" value={premium.code} onChange={e=>setPremium({...premium, code:e.target.value})} required />
                                        <button disabled={premium.loading} className="w-full premium-gradient text-white p-5 rounded-2xl font-black">VERIFIKO</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
